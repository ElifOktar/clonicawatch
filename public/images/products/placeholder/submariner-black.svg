<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="dial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="case" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a8a8a"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <!-- Case outer -->
  <circle cx="300" cy="300" r="220" fill="url(#case)"/>
  <!-- Bezel -->
  <circle cx="300" cy="300" r="200" fill="url(#bezel)"/>
  <!-- Bezel markers -->
  <g fill="#C9A961" font-family="serif" font-size="14" text-anchor="middle">
    <text x="300" y="120">60</text>
    <text x="300" y="495">30</text>
  </g>
  <!-- Dial -->
  <circle cx="300" cy="300" r="170" fill="url(#dial)"/>
  <!-- Hour markers -->
  <g fill="#C9A961">
    <rect x="296" y="140" width="8" height="22" rx="2"/>
    <rect x="296" y="438" width="8" height="22" rx="2"/>
    <rect x="140" y="296" width="22" height="8" rx="2"/>
    <rect x="438" y="296" width="22" height="8" rx="2"/>
    <circle cx="300" cy="175" r="6"/>
    <circle cx="300" cy="425" r="6"/>
    <circle cx="175" cy="300" r="6"/>
    <circle cx="425" cy="300" r="6"/>
  </g>
  <!-- Hands -->
  <g transform="translate(300,300)">
    <rect x="-4" y="-130" width="8" height="130" fill="#E5C87A" rx="2"/>
    <rect x="-3" y="-30" width="6" height="100" fill="#E5C87A" rx="2"/>
    <circle cx="0" cy="0" r="8" fill="#C9A961"/>
  </g>
  <!-- Brand text -->
  <text x="300" y="210" font-family="serif" font-size="14" fill="#C9A961" text-anchor="middle" letter-spacing="2">SUBMARINER</text>
  <text x="300" y="400" font-family="serif" font-size="10" fill="#8B7340" text-anchor="middle" letter-spacing="3">SUPER CLONE</text>
</svg>
