    <!-- Shield outline -->
    <path d="M -7 -4 L -7 3 Q 0 8 7 3 L 7 -4 Z" stroke="#d4af37" stroke-width="1.5" fill="none"/>
    <!-- Rose - simple rose shape -->
    <circle cx="0" cy="0" r="2" fill="#d4af37"/>
    <circle cx="-2" cy="-1" r="1.2" fill="#d4af37" opacity="0.8"/>
    <circle cx="2" cy="-1" r="1.2" fill="#d4af37" opacity="0.8"/>
  </g>

  <!-- TUDOR text -->
