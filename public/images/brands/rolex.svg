<svg viewBox="0 0 120 120" width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background -->
  <rect width="120" height="120" fill="transparent"/>

  <!-- Crown - 5 point crown above text -->
  <g transform="translate(60, 32)">
    <!-- Center peak -->
    <polygon points="0,-12 -3,-5 3,-5" fill="#d4af37"/>
    <!-- Left peak -->
    <polygon points="-8,-8 -11,-2 -5,-2" fill="#d4af37"/>
    <!-- Right peak -->
    <polygon points="8,-8 5,-2 11,-2" fill="#d4af37"/>
    <!-- Far left peak -->
    <polygon points="-14,-4 -16,2 -12,2" fill="#d4af37"/>
    <!-- Far right peak -->
    <polygon points="14,-4 12,2 16,2" fill="#d4af37"/>
    <!-- Crown base band -->
    <ellipse cx="0" cy="2" rx="17" ry="3" fill="none" stroke="#d4af37" stroke-width="1"/>
  </g>

  <!-- ROLEX text -->
  <text x="60" y="75" font-family="Georgia, serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#d4af37" letter-spacing="2">ROLEX</text>
</svg>
